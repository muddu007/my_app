version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: "ap-south-1"
    IMAGE_REPO_NAME: "dev"
    IMAGE_TAG: "latest"
    ECS_SERVICE_NAME: "dev_3-service-3s433myn"
    ECS_CLUSTER_NAME: "dev_cluster"
  #parameter-store:
  # Use secret manager for AWS_DEFAULT_REGION and IMAGE_REPO_NAME
  # Optional: pull secrets from SSM Parameter Store
  # API_KEY: "/your-app/api-key"
  # API_GATEWAY_URL: "/your-app/api-gateway-url"

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_REGISTRY="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
      - IMAGE_URI="$ECR_REGISTRY/$IMAGE_REPO_NAME:$IMAGE_TAG"
      - IMAGE_URI_COMMIT="$ECR_REGISTRY/$IMAGE_REPO_NAME:$CODEBUILD_RESOLVED_SOURCE_VERSION"
      - echo "Scaling up ECS service for deployment..."
      - echo "Cluster = $ECS_CLUSTER_NAME"
      - echo "Service = $ECS_SERVICE_NAME"
      - aws ecs update-service --cluster $ECS_CLUSTER_NAME --service $ECS_SERVICE_NAME --desired-count 1 2>&1
      - aws ecs wait services-stable --cluster $ECS_CLUSTER_NAME --services $ECS_SERVICE_NAME
      - echo "Service is stable, proceeding with build..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - echo "Pre-build phase complete."

  build:
    commands:
      - echo "Build started on $(date)"
      - echo "Building Docker image..."
      - docker build -t $IMAGE_URI .
      - docker tag $IMAGE_URI $IMAGE_URI_COMMIT

  post_build:
    commands:
      - echo "Build completed on $(date)"
      - echo "Pushing Docker image to ECR..."
      - docker push $IMAGE_URI
      - docker push $IMAGE_URI_COMMIT
      - echo "Writing image definitions file for ECS/CodeDeploy..."
      - printf '[{"name":"%s","imageUri":"%s"}]' "$IMAGE_REPO_NAME" "$IMAGE_URI" > imagedefinitions.json
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json

cache:
  paths:
    - "/root/.cache/pip/**/*"
